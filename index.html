<!DOCTYPE html>
<html>
  <head>
    <title>GD level to JSON</title>
    <link href="favicon.ico" rel="icon">
    <style>
      body {
        background-color: #999999;
      }

      button#download {
        margin-top: 15px;
        padding: 12px 24px;
      }
    </style>
    <script src="../keymaster/js/libs/jquery-4.0.0.min.js"></script>
    <script src="../keymaster/js/libs/FileSaver.min.js"></script>
    <script src="base64.js"></script>

  <body>

    <p>Note: Some .gmd files may not work because of how hard they are to read.</p>
    <script src="main.js"></script>
  </body>
</html>
