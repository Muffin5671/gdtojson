<!DOCTYPE html>
<html>
  <head>
    <title>GD level to JSON</title>
    <link href="favicon.ico" rel="icon">
    <style>
      body {
        background-color: #999999;
      }

      textarea {
        width: 400px;
        height: 150px;
      }

      button.big {
        margin-top: 15px;
        padding: 12px 24px;
      }
    </style>
    <script src="../keymaster/js/libs/jquery-4.0.0.min.js"></script>
    <script src="../keymaster/js/libs/FileSaver.min.js"></script>
    <script src="base64.js"></script>
    <script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
  </head>
  <body>
    <fieldset>
      <legend>GD level to JSON</legend>
      <p>Upload a .gmd file here:</p>
      <input type="file" id="file"><button id="download">Go</button>
      <br>
      <p>Or paste level data here (encoded):</p>
      <textarea id="textarea" style="width: 400px; height: 150px;"></textarea>
      <br>
      <button class="big" id="download2">Convert and download</button>
    </fieldset>
    <hr>
    <p>Note: Some .gmd files may not work because of how hard they are to read.</p>
    <script src="main.js"></script>
  </body>
</html>
